# =============================================================================
# iRedMail rsyslog configuration
# Configures mail service logging for Docker container
# =============================================================================

# Postfix chroot logging socket (imuxsock already loaded in main config)
input(type="imuxsock" Socket="/var/spool/postfix/dev/log" CreatePath="on")

# Mail logging - write directly to shared log directory for fail2ban access.
# `mail.*` catches every priority once. The previous explicit `mail.info` and
# `mail.warn` lines (now removed) were redundant subsets of `mail.*` and caused
# every mail event to be written 2-3× to the same file (info/notice 2×, warn/err
# 3×). `mail.err` still writes a second copy to mail.err for easy error-only
# filtering — that duplication is intentional.
mail.*                          -/var/log/iredmail/maillog
mail.err                        /var/log/iredmail/mail.err

# Auth logging (for dovecot, etc.)
auth,authpriv.*                 /var/log/iredmail/auth.log

# iRedAdmin web (facility local5, default in iredadmin/libs/default_settings.py)
# Routed to its own file in the shared /var/log/iredmail volume so the
# fail2ban container can read it. Python SysLogHandler sets no syslog TAG,
# so we filter by facility (local5), not programname.
local5.*                        /var/log/iredmail/iredadmin.log
& stop
