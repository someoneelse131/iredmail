# LMTP-side sieve. Activates server-side rules during mail delivery.
# Currently used to move spam (X-Spam-Flag: YES, set by amavis) into Junk
# before it ever reaches the user's INBOX.
protocol lmtp {
  mail_plugins = $mail_plugins sieve
}

plugin {
  # All scripts in this directory run BEFORE the user's personal sieve.
  sieve_before = /etc/dovecot/sieve/before.d/

  sieve_extensions = +imap4flags +editheader +copy
}
