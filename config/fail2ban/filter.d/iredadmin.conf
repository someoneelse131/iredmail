# fail2ban filter for iRedAdmin web panel login failures.
# Matches the syslog line emitted by libs/logger.py's "iredadmin" logger
# (facility local5) when the SQL backend (controllers/sql/basic.py) rejects
# a login. We patch basic.py in the Dockerfile to emit logger.warning;
# rsyslog (50-iredmail.conf) routes local5.* to /var/log/iredmail/iredadmin.log
# which is bind-mounted RO into the fail2ban container.
[Definition]
failregex = ^.* iredadmin Web login failed: client_address=<HOST>, username=
ignoreregex =
